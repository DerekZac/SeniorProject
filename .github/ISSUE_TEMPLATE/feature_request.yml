name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      placeholder: What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: dropdown
    id: epic
    attributes:
      label: Related Epic
      options:
        - Coin Search
        - Sentiment Analysis
        - Subreddit Breakdown
        - News Feed
        - Trending Coins
        - Watchlist
        - Compare
        - User Authentication / MFA
        - Profile
        - Performance
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low (nice to have)
        - Medium (planned)
        - High (blocking)
